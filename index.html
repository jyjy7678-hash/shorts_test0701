<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>YouTube Shorts iframe 테스트 v2</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
    }

    .app {
      height: 100dvh;
      width: 100vw;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      background: #000;
    }

    .short {
      position: relative;
      height: 100dvh;
      width: 100vw;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .player-wrap {
      position: relative;
      height: 100dvh;
      width: min(100vw, 520px);
      background: #000;
      overflow: hidden;
    }

    .yt-player {
      width: 100%;
      height: 100%;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    .index {
      position: absolute;
      top: calc(14px + env(safe-area-inset-top));
      left: 14px;
      z-index: 10;
      color: #fff;
      background: rgba(0,0,0,.45);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      pointer-events: none;
    }

    .note {
      position: fixed;
      top: calc(10px + env(safe-area-inset-top));
      right: 10px;
      z-index: 20;
      color: #fff;
      background: rgba(37, 99, 235, .9);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      pointer-events: none;
      transition: opacity .25s ease;
    }

    .note.hide { opacity: 0; }

    .fallback {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 10;
      color: rgba(255,255,255,.8);
      background: rgba(0,0,0,.45);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.4;
      pointer-events: none;
      transition: opacity .25s ease;
    }

    .fallback.hide { opacity: 0; }
  </style>
</head>
<body>
  <div class="note" id="note">controls=0 · reload 없음</div>
  <main class="app" id="app"></main>

  <script>
    /*
      v2 변경점
      1. 슬라이드 이동 시 iframe src를 다시 로드하지 않습니다.
      2. YouTube IFrame API로 현재 영상 playVideo, 이전 영상 pauseVideo만 호출합니다.
      3. controls=0 옵션으로 하단 컨트롤/버튼 노출을 최소화합니다.
      4. autoplay + mute 상태로 시작합니다.

      주의:
      YouTube iframe 내부의 상단 제목/Shorts 로고/일시정지 아이콘 등은
      YouTube가 자체적으로 제어하는 UI라 완전 제거가 안 될 수 있습니다.
    */

    const videoIds = [
      "dQw4w9WgXcQ",
      "9bZkp7q19f0",
      "kJQP7kiw5Fk",
      "hT_nvWreIhg",
      "fJ9rUzIMcZQ",
      "OPf0YbXqDm0",
      "CevxZvSJLk8",
      "RgKAFK5djSk",
      "JGwWNGJdvx8",
      "60ItHLz5WEA"
    ];

    const app = document.getElementById("app");
    const players = [];
    let currentIndex = 0;
    let apiReady = false;

    videoIds.forEach((id, i) => {
      const section = document.createElement("section");
      section.className = "short";
      section.dataset.index = i;

      const wrap = document.createElement("div");
      wrap.className = "player-wrap";

      const playerDiv = document.createElement("div");
      playerDiv.className = "yt-player";
      playerDiv.id = `player-${i}`;

      const index = document.createElement("div");
      index.className = "index";
      index.textContent = `${i + 1} / ${videoIds.length}`;

      const fallback = document.createElement("div");
      fallback.className = "fallback";
      fallback.textContent = "슬라이드 이동 시 재로딩 없이 play/pause만 테스트";
      setTimeout(() => fallback.classList.add("hide"), 2500);

      wrap.appendChild(playerDiv);
      wrap.appendChild(index);
      wrap.appendChild(fallback);
      section.appendChild(wrap);
      app.appendChild(section);
    });

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function () {
      apiReady = true;

      videoIds.forEach((videoId, i) => {
        players[i] = new YT.Player(`player-${i}`, {
          videoId,
          width: "100%",
          height: "100%",
          playerVars: {
            autoplay: i === 0 ? 1 : 0,
            mute: 1,
            controls: 0,
            playsinline: 1,
            rel: 0,
            fs: 0,
            disablekb: 1,
            iv_load_policy: 3,
            modestbranding: 1,
            enablejsapi: 1,
            origin: location.origin
          },
          events: {
            onReady: (event) => {
              event.target.mute();

              if (i === 0) {
                safePlay(event.target);
              } else {
                event.target.pauseVideo();
              }
            },
            onStateChange: (event) => {
              if (event.data === YT.PlayerState.ENDED) {
                event.target.seekTo(0, true);
                safePlay(event.target);
              }
            }
          }
        });
      });
    };

    function safePlay(player) {
      try {
        player.mute();
        player.playVideo();
      } catch (e) {}
    }

    function safePause(player) {
      try {
        player.pauseVideo();
      } catch (e) {}
    }

    function activate(index) {
      if (!apiReady || !players[index]) return;

      currentIndex = index;

      players.forEach((player, i) => {
        if (!player || typeof player.playVideo !== "function") return;
        if (i === currentIndex) {
          safePlay(player);
        } else {
          safePause(player);
        }
      });
    }

    const sections = [...document.querySelectorAll(".short")];
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting || entry.intersectionRatio < 0.65) return;

        const next = Number(entry.target.dataset.index);
        if (next !== currentIndex) {
          activate(next);
        }
      });
    }, { threshold: [0.65] });

    sections.forEach(section => observer.observe(section));

    let scrollTimer = null;
    app.addEventListener("scroll", () => {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        const idx = Math.round(app.scrollTop / window.innerHeight);
        if (idx >= 0 && idx < videoIds.length) activate(idx);
      }, 120);
    }, { passive: true });

    setTimeout(() => document.getElementById("note").classList.add("hide"), 2500);
  </script>
</body>
</html>
