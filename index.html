<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>YouTube Shorts iframe 최소 UI 테스트 v4</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .app {
      height: 100dvh;
      width: 100vw;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      background: #000;
    }

    .short {
      position: relative;
      height: 100dvh;
      width: 100vw;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .player-wrap {
      position: relative;
      height: 100dvh;
      width: min(100vw, 520px);
      background: #000;
      overflow: hidden;
    }

    .yt-player,
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    .top-version {
      position: fixed;
      top: calc(10px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      color: rgba(255,255,255,.9);
      background: rgba(0,0,0,.58);
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 1;
      pointer-events: none;
      transition: opacity .25s ease;
    }

    .top-version.hide { opacity: 0; }

    .tap-hint {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 30;
      color: rgba(255,255,255,.86);
      background: rgba(0,0,0,.55);
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity .25s ease;
    }

    .tap-hint.hide { opacity: 0; }

    /* v4는 의도적으로 iframe 위에 투명 overlay를 올리지 않습니다.
       YouTube iframe 기본 자동 숨김 동작을 최대한 방해하지 않는 구조입니다. */
  </style>
</head>
<body>
  <div class="top-version" id="topVersion">v4 · controls=0 · 최소 UI</div>
  <div class="tap-hint" id="tapHint">슬라이드 이동 / 화면 터치 시 YouTube 기본 UI 확인</div>
  <main class="app" id="app"></main>

  <script>
    /*
      v4 목적
      - 화면에 테스트 버튼/오버레이를 최대한 두지 않음
      - YouTube controls=0 적용
      - iframe src 재로딩 없이 YouTube IFrame API play/pause만 사용
      - iframe 위를 덮는 투명 overlay 없음
      - YouTube 내부 UI가 기본으로 노출되는지, 얼마나 빨리 사라지는지 확인

      한계
      - YouTube iframe 내부 상단/하단/중앙 오버레이는 외부 HTML에서 직접 숨김 시간을 제어하기 어려움
      - v4는 기본 노출을 최소화하는 구조 테스트용
    */

    const videoIds = [
      "dQw4w9WgXcQ",
      "9bZkp7q19f0",
      "kJQP7kiw5Fk",
      "hT_nvWreIhg",
      "fJ9rUzIMcZQ",
      "OPf0YbXqDm0",
      "CevxZvSJLk8",
      "RgKAFK5djSk",
      "JGwWNGJdvx8",
      "60ItHLz5WEA"
    ];

    const app = document.getElementById("app");
    const players = [];
    let currentIndex = 0;
    let apiReady = false;

    videoIds.forEach((id, i) => {
      const section = document.createElement("section");
      section.className = "short";
      section.dataset.index = i;

      const wrap = document.createElement("div");
      wrap.className = "player-wrap";

      const playerDiv = document.createElement("div");
      playerDiv.className = "yt-player";
      playerDiv.id = `player-${i}`;

      wrap.appendChild(playerDiv);
      section.appendChild(wrap);
      app.appendChild(section);
    });

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function () {
      apiReady = true;
      videoIds.forEach((videoId, i) => {
        players[i] = new YT.Player(`player-${i}`, {
          videoId,
          width: "100%",
          height: "100%",
          playerVars: {
            autoplay: i === 0 ? 1 : 0,
            mute: 1,
            controls: 0,
            playsinline: 1,
            rel: 0,
            fs: 0,
            disablekb: 1,
            iv_load_policy: 3,
            enablejsapi: 1,
            origin: location.origin,
            loop: 1,
            playlist: videoId
          },
          events: {
            onReady: (event) => {
              event.target.mute();
              if (i === 0) safePlay(event.target);
              else event.target.pauseVideo();
            },
            onStateChange: (event) => {
              if (event.data === YT.PlayerState.ENDED) {
                event.target.seekTo(0, true);
                safePlay(event.target);
              }
            }
          }
        });
      });
    };

    function safePlay(player) {
      try {
        player.mute();
        player.playVideo();
      } catch (e) {}
    }

    function safePause(player) {
      try { player.pauseVideo(); } catch (e) {}
    }

    function activate(index) {
      if (!apiReady || !players[index]) return;
      currentIndex = index;
      players.forEach((player, i) => {
        if (!player || typeof player.playVideo !== "function") return;
        if (i === currentIndex) safePlay(player);
        else safePause(player);
      });
    }

    const sections = [...document.querySelectorAll(".short")];
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting || entry.intersectionRatio < 0.66) return;
        const next = Number(entry.target.dataset.index);
        if (next !== currentIndex) activate(next);
      });
    }, { threshold: [0.66] });

    sections.forEach(section => observer.observe(section));

    let scrollTimer = null;
    app.addEventListener("scroll", () => {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        const idx = Math.round(app.scrollTop / window.innerHeight);
        if (idx >= 0 && idx < videoIds.length) activate(idx);
      }, 90);
    }, { passive: true });

    app.addEventListener("touchend", () => {
      if (players[currentIndex]) safePlay(players[currentIndex]);
    }, { passive: true });

    setTimeout(() => document.getElementById("topVersion").classList.add("hide"), 1800);
    setTimeout(() => document.getElementById("tapHint").classList.add("hide"), 2400);
  </script>
</body>
</html>
