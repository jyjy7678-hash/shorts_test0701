<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>YouTube Shorts iframe 오버레이 비교 테스트 v3</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
    }

    .app {
      height: 100dvh;
      width: 100vw;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      background: #000;
    }

    .short {
      position: relative;
      height: 100dvh;
      width: 100vw;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .player-wrap {
      position: relative;
      height: 100dvh;
      width: min(100vw, 520px);
      background: #000;
      overflow: hidden;
    }

    .yt-player,
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    .index {
      position: absolute;
      top: calc(14px + env(safe-area-inset-top));
      left: 14px;
      z-index: 30;
      color: #fff;
      background: rgba(0,0,0,.45);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      pointer-events: none;
    }

    .mode-panel {
      position: fixed;
      top: calc(10px + env(safe-area-inset-top));
      right: 10px;
      z-index: 50;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 78vw;
      transition: opacity .25s ease;
    }

    .mode-panel.dim { opacity: .22; }

    .mode-btn {
      border: 0;
      border-radius: 999px;
      padding: 7px 10px;
      color: #fff;
      background: rgba(80,80,80,.9);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .mode-btn.active { background: rgba(37, 99, 235, .96); }

    .version {
      position: fixed;
      left: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 50;
      color: rgba(255,255,255,.85);
      background: rgba(0,0,0,.55);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.4;
      pointer-events: none;
      transition: opacity .25s ease;
    }

    .version.dim { opacity: .18; }

    .test-overlay {
      position: absolute;
      inset: 0 0 110px 0;
      z-index: 20;
      background: rgba(255, 0, 0, .045);
      touch-action: none;
      cursor: pointer;
    }

    .test-overlay.pass {
      pointer-events: none;
      background: rgba(0, 120, 255, .035);
    }

    .tap-log {
      position: fixed;
      left: 50%;
      top: 56px;
      transform: translateX(-50%);
      z-index: 70;
      color: #fff;
      background: rgba(0,0,0,.7);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      opacity: 0;
      transition: opacity .18s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .tap-log.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="mode-panel" id="modePanel">
    <button class="mode-btn active" data-mode="none">A 기본</button>
    <button class="mode-btn" data-mode="block">B 오버레이 차단</button>
    <button class="mode-btn" data-mode="pass">C 오버레이 통과</button>
  </div>
  <div class="tap-log" id="tapLog">overlay click</div>
  <div class="version" id="version">
    v3 · overlay 비교 테스트<br />
    A: iframe만 / B: 뷰스터식 덮개 / C: pointer-events:none
  </div>
  <main class="app" id="app"></main>

  <script>
    /*
      v3 목적
      - YouTube Shorts iframe 자체 오버레이가 빈 공간 터치 후 사라지는지 확인
      - 뷰스터처럼 iframe 위에 absolute overlay를 올렸을 때 터치 이벤트를 가로채는지 확인
      - B 모드: overlay가 터치를 가로챔
      - C 모드: overlay는 있지만 pointer-events:none으로 iframe 터치 통과

      테스트 방법
      1. A 기본: 영상 빈 공간 터치 → YouTube 버튼이 사라지는지 확인
      2. B 오버레이 차단: 같은 동작이 막히는지 확인
      3. C 오버레이 통과: 다시 사라지는지 확인
    */

    const videoIds = [
      "dQw4w9WgXcQ",
      "9bZkp7q19f0",
      "kJQP7kiw5Fk",
      "hT_nvWreIhg",
      "fJ9rUzIMcZQ",
      "OPf0YbXqDm0",
      "CevxZvSJLk8",
      "RgKAFK5djSk",
      "JGwWNGJdvx8",
      "60ItHLz5WEA"
    ];

    const app = document.getElementById("app");
    const modePanel = document.getElementById("modePanel");
    const version = document.getElementById("version");
    const tapLog = document.getElementById("tapLog");
    const players = [];
    let currentIndex = 0;
    let apiReady = false;
    let mode = "none";

    videoIds.forEach((id, i) => {
      const section = document.createElement("section");
      section.className = "short";
      section.dataset.index = i;

      const wrap = document.createElement("div");
      wrap.className = "player-wrap";

      const playerDiv = document.createElement("div");
      playerDiv.className = "yt-player";
      playerDiv.id = `player-${i}`;

      const index = document.createElement("div");
      index.className = "index";
      index.textContent = `${i + 1} / ${videoIds.length}`;

      wrap.appendChild(playerDiv);
      wrap.appendChild(index);
      section.appendChild(wrap);
      app.appendChild(section);
    });

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function () {
      apiReady = true;

      videoIds.forEach((videoId, i) => {
        players[i] = new YT.Player(`player-${i}`, {
          videoId,
          width: "100%",
          height: "100%",
          playerVars: {
            autoplay: i === 0 ? 1 : 0,
            mute: 1,
            controls: 1,
            playsinline: 1,
            rel: 0,
            fs: 1,
            disablekb: 1,
            iv_load_policy: 3,
            enablejsapi: 1,
            origin: location.origin
          },
          events: {
            onReady: (event) => {
              event.target.mute();
              if (i === 0) safePlay(event.target);
              else event.target.pauseVideo();
            },
            onStateChange: (event) => {
              if (event.data === YT.PlayerState.ENDED) {
                event.target.seekTo(0, true);
                safePlay(event.target);
              }
            }
          }
        });
      });
    };

    function safePlay(player) {
      try {
        player.mute();
        player.playVideo();
      } catch (e) {}
    }

    function safePause(player) {
      try { player.pauseVideo(); } catch (e) {}
    }

    function activate(index) {
      if (!apiReady || !players[index]) return;
      currentIndex = index;
      players.forEach((player, i) => {
        if (!player || typeof player.playVideo !== "function") return;
        if (i === currentIndex) safePlay(player);
        else safePause(player);
      });
    }

    function setMode(nextMode) {
      mode = nextMode;
      document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });
      applyOverlayMode();
      showLog(mode === "none" ? "A 기본: overlay 없음" : mode === "block" ? "B: overlay가 터치 가로챔" : "C: overlay는 있지만 터치 통과");
    }

    function applyOverlayMode() {
      document.querySelectorAll(".test-overlay").forEach(el => el.remove());
      if (mode === "none") return;

      document.querySelectorAll(".player-wrap").forEach(wrap => {
        const overlay = document.createElement("div");
        overlay.className = "test-overlay" + (mode === "pass" ? " pass" : "");
        overlay.setAttribute("aria-hidden", "true");
        overlay.addEventListener("click", () => showLog("overlay click: iframe에 터치 전달 안 됨"));
        wrap.appendChild(overlay);
      });
    }

    function showLog(text) {
      tapLog.textContent = text;
      tapLog.classList.add("show");
      clearTimeout(showLog.timer);
      showLog.timer = setTimeout(() => tapLog.classList.remove("show"), 1300);
    }

    const sections = [...document.querySelectorAll(".short")];
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting || entry.intersectionRatio < 0.65) return;
        const next = Number(entry.target.dataset.index);
        if (next !== currentIndex) activate(next);
      });
    }, { threshold: [0.65] });

    sections.forEach(section => observer.observe(section));

    let scrollTimer = null;
    app.addEventListener("scroll", () => {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        const idx = Math.round(app.scrollTop / window.innerHeight);
        if (idx >= 0 && idx < videoIds.length) activate(idx);
      }, 120);
    }, { passive: true });

    modePanel.addEventListener("click", (e) => {
      const btn = e.target.closest(".mode-btn");
      if (!btn) return;
      setMode(btn.dataset.mode);
    });

    setTimeout(() => {
      modePanel.classList.add("dim");
      version.classList.add("dim");
    }, 3500);
  </script>
</body>
</html>
